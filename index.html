<!doctype html>
<html lang="pt">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Quiz de Matemática</title>
  <style>
    :root {
      --bg: #f6f8fb;
      --card: #ffffff;
      --line: #d8dee8;
      --text: #1a2233;
      --muted: #4f5b72;
      --accent: #0d6efd;
      --accent-soft: #e8f1ff;
    }

    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "Trebuchet MS", "Segoe UI", sans-serif;
      background: linear-gradient(180deg, #eef3fb 0%, var(--bg) 40%, #f8fafc 100%);
      color: var(--text);
      line-height: 1.4;
    }

    .container {
      max-width: 950px;
      margin: 0 auto;
      padding: 28px 16px 40px;
    }

    h1 {
      margin: 0 0 8px;
      font-size: clamp(1.4rem, 3vw, 2rem);
    }

    .subtitle {
      margin: 0 0 20px;
      color: var(--muted);
    }

    .question {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 16px;
      margin-bottom: 14px;
      box-shadow: 0 2px 8px rgba(20, 30, 50, 0.04);
    }

    .q-title {
      font-size: 1.05rem;
      font-weight: 700;
      margin-bottom: 8px;
    }

    .q-text {
      margin-bottom: 10px;
    }

    .q-image {
      width: 100%;
      max-width: 520px;
      border: 1px solid var(--line);
      border-radius: 10px;
      background: white;
      padding: 6px;
      margin: 4px 0 10px;
    }

    .choices {
      display: grid;
      gap: 8px;
    }

    .choice {
      border: 1px solid var(--line);
      border-radius: 10px;
      padding: 10px;
      display: flex;
      gap: 10px;
      align-items: flex-start;
      cursor: pointer;
      background: #fff;
    }

    .choice:hover {
      border-color: #b8c7df;
      background: #fbfdff;
    }

    .choice.is-correct {
      border-color: #1f9d55;
      background: #eafaf0;
    }

    .choice.is-wrong {
      border-color: #d03a3a;
      background: #fdeaea;
    }

    .choice input {
      margin-top: 2px;
      transform: scale(1.1);
    }

    .answer-feedback {
      margin-top: 10px;
      padding: 10px 12px;
      background: #eef0f3;
      border: none;
      border-radius: 8px;
    }

    .answer-feedback.is-hidden {
      display: none;
    }

    .feedback-title {
      font-weight: 700;
      margin-bottom: 4px;
    }

    .footer {
      position: sticky;
      bottom: 0;
      background: rgba(246, 248, 251, 0.9);
      backdrop-filter: blur(6px);
      border-top: 1px solid var(--line);
      padding: 12px 0;
      margin-top: 8px;
    }

    .footer-inner {
      max-width: 950px;
      margin: 0 auto;
      padding: 0 16px;
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      align-items: center;
      justify-content: space-between;
    }

    button {
      border: 0;
      border-radius: 10px;
      padding: 10px 14px;
      font-weight: 700;
      cursor: pointer;
    }

    .btn-primary {
      background: var(--accent);
      color: white;
    }

    .btn-secondary {
      background: #e9eef7;
      color: #21304a;
    }

    .status {
      color: var(--muted);
      font-size: 0.95rem;
      background: var(--accent-soft);
      border: 1px solid #cde0ff;
      border-radius: 10px;
      padding: 8px 10px;
    }

    .results-sheet {
      margin-top: 16px;
      background: #fff;
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 14px;
      box-shadow: 0 2px 8px rgba(20, 30, 50, 0.04);
    }

    .results-sheet h2 {
      margin: 0 0 10px;
      font-size: 1.1rem;
    }

    .result-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
      gap: 10px;
    }

    .result-box {
      background: #f7faff;
      border: 1px solid #d9e7ff;
      border-radius: 10px;
      padding: 10px;
    }

    .result-box strong {
      display: block;
      font-size: 1.2rem;
    }

    .feedback-message {
      margin-top: 12px;
      background: #f6f9ff;
      border: 1px solid #d5e2ff;
      color: #21304a;
      border-radius: 10px;
      padding: 10px 12px;
      font-weight: 600;
    }

    .confetti-canvas {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 9999;
    }

    .is-hidden {
      display: none;
    }

    @media (max-width: 600px) {
      .question { padding: 12px; }
      .choice { padding: 8px; }
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Quiz de Matemática</h1>

    <form id="quizForm"></form>
  </div>

  <div class="footer">
    <div class="footer-inner">
      <div id="status" class="status">0 de 15 respondidas</div>
      <div>
        <button type="button" id="clearBtn" class="btn-secondary">Limpar respostas</button>
        <button type="button" id="saveBtn" class="btn-primary">Ver resultado</button>
      </div>
    </div>
  </div>

  <script>
    const questions = [
      {
        id: 1,
        text: "O valor de (3/5) ÷ (−2) é igual a:",
        choices: ["−3/10", "3/10", "6/10", "−6/10"],
        correctIndex: 0,
        explanation: "Dividir por −2 é multiplicar por −1/2: (3/5)×(−1/2)=−3/10."
      },
      {
        id: 2,
        text: "Na figura, o quadrilátero [ABCD] é um papagaio. Sabendo que AC = 2 m e BD = 1,5 m. Qual é, em metros quadrados, a área do papagaio?",
        image: "assets/image1.png",
        choices: ["3 m²", "2 m²", "1,5 m²", "0,75 m²"],
        correctIndex: 2,
        explanation: "A área do papagaio é (d1×d2)/2. Com AC=2 e BD=1,5: (2×1,5)/2=1,5 m²."
      },
      {
        id: 3,
        text: "Qual é o valor de (−3/4) ÷ (1/4) × (−1)?",
        choices: ["48", "−3", "−48", "3"],
        correctIndex: 3,
        explanation: "(-3/4)÷(1/4)=(-3/4)×4=−3; depois ×(−1)=3."
      },
      {
        id: 4,
        text: "O produto de 7 milhões por 21 × 10⁵ é:",
        choices: ["147 × 10⁵", "7 × 21 × 10⁹", "7 × 21 × 10¹¹", "1,47 × 10⁷"],
        correctIndex: 2,
        explanation: "7 milhões = 7×10⁶. (7×10⁶)(21×10⁵)=7×21×10¹¹."
      },
      {
        id: 5,
        text: "Qual dos números representa o produto 10⁴ × 5³ × 10² × 2³?",
        choices: ["10⁶", "10⁷", "10⁸", "10⁹"],
        correctIndex: 3,
        explanation: "10⁴×10²=10⁶ e 5³×2³=(10)³=10³; produto=10⁹."
      },
      {
        id: 6,
        text: "Observa a figura, em que os pontos A, B e C pertencem à mesma reta. Qual das seguintes expressões representa a distância entre A e C?",
        image: "assets/image2.png",
        choices: ["12x + 9", "2x − 3", "3 − 2x", "7x + 3"],
        correctIndex: 0,
        explanation: "AC = AB + BC = (7x+3)+(5x+6)=12x+9."
      },
      {
        id: 7,
        text: "A percentagem da letra A na palavra MATEMÁTICA é:",
        choices: ["0,03 %", "3 %", "30 %", "70 %"],
        correctIndex: 2,
        explanation: "MATEMÁTICA tem 10 letras e 3 são A/Á; 3/10=30%."
      },
      {
        id: 8,
        text: "A figura representa uma sequência formada por quadrados. O perímetro da primeira figura é 40 cm. Qual é o perímetro da figura 4?",
        image: "assets/image3.png",
        choices: ["80 cm", "100 cm", "130 cm", "140 cm"],
        correctIndex: 1,
        explanation: "Se 1 quadrado tem perímetro 40, o lado é 10. Na figura 4 há 4 quadrados em linha: perímetro=2(4·10+10)=100 cm."
      },
      {
        id: 9,
        text: "A Matilde conseguiu equilibrar uma balança distribuindo um peso de 60 g e 9 lápis de cor todos de igual massa pelos dois pratos. Qual é a massa de cada um dos lápis?",
        image: "assets/image4.png",
        choices: ["15 g", "18 g", "20 g", "30 g"],
        correctIndex: 2,
        explanation: "Balança: 6 lápis = 60 g + 3 lápis, então 3 lápis=60 g e cada um pesa 20 g."
      },
      {
        id: 10,
        text: "O número −1 é solução de qual das equações seguintes?",
        choices: ["3 + 3x = 10", "15x − x = 6x + 8", "13x − 7 = 12x − 8", "22x − 22 = 15x − 15"],
        correctIndex: 2,
        explanation: "Substituindo x=−1, só 13x−7=12x−8 é verdadeira."
      },
      {
        id: 11,
        text: "Numa caixa, os bombons de chocolate branco estão dispostos entre filas de chocolate negro. Qual é o número total de bombons da caixa de ordem 10?",
        image: "assets/image5.png",
        choices: ["40", "32", "22", "10"],
        correctIndex: 1,
        explanation: "O total forma sequência 5, 8, 11, ... (acrescenta 3). Fórmula 3n+2; para n=10 dá 32."
      },
      {
        id: 12,
        text: "A Cátia comeu 1/5 de uma tarte e o Júlio comeu 1/4 da mesma tarte. Que parte da tarte sobrou?",
        choices: ["9/20", "2/3", "7/9", "11/20"],
        correctIndex: 3,
        explanation: "1 − 1/5 − 1/4 = 1 − 9/20 = 11/20."
      },
      {
        id: 13,
        text: "O valor numérico da expressão 3 + a − (−b) + 1 para a = −2 e b = 2 é:",
        choices: ["4", "1", "3", "2"],
        correctIndex: 0,
        explanation: "3+a−(−b)+1 = 3+a+b+1. Com a=−2 e b=2 dá 4."
      },
      {
        id: 14,
        text: "O Miguel foi ao bar da escola, mas como não tinha dinheiro ficou a dever 2,30 euros. No dia seguinte a mãe deu-lhe 5 euros. O Miguel pagou a dívida e ainda pediu uma sandes que custava 0,80 euros. Com quanto dinheiro ficou no final?",
        choices: ["3,5 euros", "1,9 euros", "4,2 euros", "3,1 euros"],
        correctIndex: 1,
        explanation: "5,00 − 2,30 − 0,80 = 1,90."
      },
      {
        id: 15,
        text: "Observa a balança que está em equilíbrio. Qual é a massa da bola azul?",
        image: "assets/image6.png",
        choices: ["26 Kg", "30 Kg", "33 Kg", "27 Kg"],
        correctIndex: 3,
        explanation: "Equilíbrio: 3 kg + bola = 2 kg + 28 kg = 30 kg, então a bola pesa 27 kg."
      }
    ];

    const quizForm = document.getElementById("quizForm");
    const statusEl = document.getElementById("status");
    const containerEl = document.querySelector(".container");

    function renderQuiz() {
      quizForm.innerHTML = "";

      questions.forEach((q) => {
        const section = document.createElement("section");
        section.className = "question";
        section.dataset.qid = q.id;

        const title = document.createElement("div");
        title.className = "q-title";
        title.textContent = `Questão ${q.id}`;

        const text = document.createElement("div");
        text.className = "q-text";
        text.textContent = q.text;

        section.appendChild(title);
        section.appendChild(text);

        if (q.image) {
          const img = document.createElement("img");
          img.src = q.image;
          img.alt = `Imagem da questão ${q.id}`;
          img.className = "q-image";
          section.appendChild(img);
        }

        const choices = document.createElement("div");
        choices.className = "choices";

        q.choices.forEach((choiceText, i) => {
          const label = document.createElement("label");
          label.className = "choice";

          const input = document.createElement("input");
          input.type = "radio";
          input.name = `q${q.id}`;
          input.value = i;
          input.addEventListener("change", updateStatus);

          const textNode = document.createElement("span");
          textNode.textContent = `(${String.fromCharCode(65 + i)}) ${choiceText}`;

          label.appendChild(input);
          label.appendChild(textNode);
          choices.appendChild(label);
        });

        section.appendChild(choices);

        const feedback = document.createElement("div");
        feedback.className = "answer-feedback is-hidden";
        feedback.setAttribute("aria-live", "polite");
        section.appendChild(feedback);

        quizForm.appendChild(section);
      });

      updateStatus();
    }

    function updateStatus() {
      const answered = questions.filter((q) =>
        quizForm.querySelector(`input[name="q${q.id}"]:checked`)
      ).length;
      statusEl.textContent = `${answered} de ${questions.length} respondidas`;
    }

    function clearAnswers() {
      quizForm.querySelectorAll("input[type='radio']").forEach((i) => {
        i.checked = false;
      });
      clearHighlights();
      quizForm.querySelectorAll(".answer-feedback").forEach((el) => {
        el.classList.add("is-hidden");
        el.innerHTML = "";
      });
      const existingSheet = document.getElementById("resultsSheet");
      if (existingSheet) {
        existingSheet.remove();
      }
      updateStatus();
    }

    function clearHighlights() {
      quizForm.querySelectorAll(".choice").forEach((label) => {
        label.classList.remove("is-correct", "is-wrong");
      });
    }

    function applyAnswerHighlights() {
      clearHighlights();
      questions.forEach((q) => {
        const checked = quizForm.querySelector(`input[name="q${q.id}"]:checked`);
        if (!checked) return;
        const label = checked.closest(".choice");
        if (!label) return;
        const isCorrect = Number(checked.value) === q.correctIndex;
        label.classList.add(isCorrect ? "is-correct" : "is-wrong");
      });
    }

    function applyAnswerFeedback() {
      questions.forEach((q) => {
        const section = quizForm.querySelector(`section[data-qid="${q.id}"]`);
        if (!section) return;
        const feedback = section.querySelector(".answer-feedback");
        if (!feedback) return;
        const checked = quizForm.querySelector(`input[name="q${q.id}"]:checked`);
        if (!checked || Number(checked.value) === q.correctIndex) {
          feedback.classList.add("is-hidden");
          feedback.innerHTML = "";
          return;
        }
        const correctLabel = String.fromCharCode(65 + q.correctIndex);
        const correctText = q.choices[q.correctIndex];
        feedback.innerHTML = `
          <div class="feedback-title">Resposta correta: (${correctLabel}) ${correctText}</div>
          <div class="feedback-body">${q.explanation}</div>
        `;
        feedback.classList.remove("is-hidden");
      });
    }

    function getFeedbackMessage(correct, total) {
      if (correct === 0) {
        return "Você não respondeu corretamente nenhuma questão. Tente novamente!";
      }
      if (correct === total) {
        return "Parabéns! Você acertou todas as questões!";
      }
      if (correct < total / 2) {
        return `Você acertou ${correct} de ${total} questões. Continue praticando para melhorar!`;
      }
      return `Bom trabalho! Você acertou ${correct} de ${total} questões. Com um pouco mais de prática, você pode acertar todas!`;
    }

    function launchConfetti() {
      const canvas = document.createElement("canvas");
      canvas.className = "confetti-canvas";
      document.body.appendChild(canvas);
      const ctx = canvas.getContext("2d");

      const resize = () => {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
      };
      resize();

      const colors = ["#0d6efd", "#1f9d55", "#f59e0b", "#d03a3a", "#7c3aed"];
      const pieces = Array.from({ length: 140 }, () => ({
        x: Math.random() * canvas.width,
        y: -20 - Math.random() * canvas.height * 0.4,
        vx: -2 + Math.random() * 4,
        vy: 2 + Math.random() * 4,
        size: 5 + Math.random() * 7,
        color: colors[Math.floor(Math.random() * colors.length)],
        rot: Math.random() * Math.PI * 2,
        vr: -0.15 + Math.random() * 0.3
      }));

      let start = 0;
      const duration = 2200;

      function frame(timestamp) {
        if (!start) start = timestamp;
        const elapsed = timestamp - start;

        ctx.clearRect(0, 0, canvas.width, canvas.height);
        pieces.forEach((p) => {
          p.x += p.vx;
          p.y += p.vy;
          p.vy += 0.03;
          p.rot += p.vr;

          ctx.save();
          ctx.translate(p.x, p.y);
          ctx.rotate(p.rot);
          ctx.fillStyle = p.color;
          ctx.fillRect(-p.size / 2, -p.size / 2, p.size, p.size * 0.6);
          ctx.restore();
        });

        if (elapsed < duration) {
          requestAnimationFrame(frame);
        } else {
          canvas.remove();
        }
      }

      requestAnimationFrame(frame);
      setTimeout(() => canvas.remove(), duration + 300);
    }

    function saveSummary() {
      let correct = 0;

      questions.forEach((q) => {
        const checked = quizForm.querySelector(`input[name="q${q.id}"]:checked`);
        if (checked && Number(checked.value) === q.correctIndex) {
          correct += 1;
        }
      });
      applyAnswerHighlights();
      applyAnswerFeedback();

      const total = questions.length;
      const wrong = total - correct;
      const rightPct = ((correct / total) * 100).toFixed(1);
      const wrongPct = ((wrong / total) * 100).toFixed(1);
      const feedbackMessage = getFeedbackMessage(correct, total);

      let sheet = document.getElementById("resultsSheet");
      if (!sheet) {
        sheet = document.createElement("section");
        sheet.id = "resultsSheet";
        sheet.className = "results-sheet";
        containerEl.appendChild(sheet);
      }

      sheet.innerHTML = `
        <h2>Resultado do Quiz</h2>
        <div class="result-grid">
          <div class="result-box">
            <div>Corretas</div>
            <strong>${correct}/${total}</strong>
            <div>${rightPct}%</div>
          </div>
          <div class="result-box">
            <div>Erradas</div>
            <strong>${wrong}/${total}</strong>
            <div>${wrongPct}%</div>
          </div>
        </div>
        <div class="feedback-message">${feedbackMessage}</div>
      `;

      if ((correct / total) >= 0.8) {
        launchConfetti();
      }

      sheet.scrollIntoView({ behavior: "smooth", block: "start" });
    }

    document.getElementById("clearBtn").addEventListener("click", clearAnswers);
    document.getElementById("saveBtn").addEventListener("click", saveSummary);

    renderQuiz();
  </script>
</body>
</html>
